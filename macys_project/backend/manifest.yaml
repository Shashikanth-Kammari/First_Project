apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-configmap
  namespace: macys
data:
  DB_HOST: mysql #mysql config service name


---


apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: macys
  labels:
    component: backend
    tier: app
    project: macys
spec:
  replicas: 2
  selector:
    matchLabels:
      component: backend
      tier: app
      project: macys
  template:
    metadata:
      labels:
        component: backend
        tier: app
        project: macys
    spec:
      containers:
      - name: backend
        image: shashikanth/backend:v1.0
        envFrom:
          configMapRef:
            name: backend
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        failureThreshold: 2
        initialDelaySeconds: 30  # Wait before checking the first time
        periodSeconds: 5       # Interval between checks
      readinessProbe:
        httpGet:
          path: /readyz
          port: 80
        failureThreshold: 2
        initialDelaySeconds: 30   # Checks much sooner during startup
        periodSeconds: 5         # Evaluated frequently for quick isolation
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "150"
          memory: "256Mi"
---

apiVersion: v1
kind: Service
metadata:
  name: Macys-service
  namespace: macys
spec:
  selector:
    component: mysql
    tier: app
    project: macys
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080