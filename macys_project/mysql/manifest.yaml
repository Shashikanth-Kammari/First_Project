apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: macys
  labels:
    component: mysql
    tier: db
    project: macys
spec:
  replicas: 2
  selector:
    matchLabels:
      component: mysql
      tier: db
      project: macys
  template:
    metadata:
      labels:
        component: mysql
        tier: db
        project: macys
    spec:
      containers:
      - name: mysql
        image: shashikanth/mysql:v1.0
      livenessProbe:
        tcpSocket:
          port: 3306
        initialDelaySeconds: 10  # Wait before checking the first time
        periodSeconds: 10        # Interval between checks

    # Pulls the container out of the load balancer if /readyz fails
      readinessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 5   # Checks much sooner during startup
        periodSeconds: 5         # Evaluated frequently for quick isolation

---

apiVersion: v1
kind: Service
metadata:
  name: Macys-service
  namespace: macys
spec:
  selector:
    component: mysql
    tier: db
    project: macys
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306