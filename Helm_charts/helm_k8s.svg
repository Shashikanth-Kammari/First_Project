<svg xmlns="http://www.w3.org/2000/svg" width="680" height="920" viewBox="0 0 680 920">
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .d1{animation:dash 2s linear infinite}
      .d2{animation:dash 2s linear infinite .5s}
      .d3{animation:dash 2s linear infinite 1s}
      .pod{animation:pop 2.4s ease-in-out infinite}
      @keyframes dash{to{stroke-dashoffset:-24}}
      @keyframes pop{0%,100%{opacity:.5;r:5}50%{opacity:1;r:7}}
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- card bg -->
  <rect x="20" y="10" width="640" height="900" rx="22" fill="#080D1C"/>
  <!-- top accent bar -->
  <rect x="20" y="10" width="640" height="6" rx="3" fill="#7F77DD"/>

  <!-- title -->
  <text font-family="sans-serif" font-weight="700" font-size="24" fill="#FFFFFF" x="340" y="58" text-anchor="middle">Helm → Kubernetes</text>
  <text font-family="sans-serif" font-size="13" fill="#85B7EB" x="340" y="80" text-anchor="middle">From chart to running pod</text>

  <!-- HELM zone label -->
  <rect x="44" y="96" width="72" height="20" rx="10" fill="#1E1650"/>
  <text font-family="sans-serif" font-size="11" font-weight="600" fill="#AFA9EC" x="80" y="110" text-anchor="middle">HELM</text>

  <!-- Chart.yaml -->
  <rect x="44" y="124" width="172" height="72" rx="12" fill="#13102A"/>
  <rect x="44" y="124" width="172" height="4" rx="2" fill="#534AB7"/>
  <rect x="62" y="138" width="22" height="28" rx="3" fill="none" stroke="#7F77DD" stroke-width="1.2"/>
  <line x1="67" y1="148" x2="79" y2="148" stroke="#7F77DD" stroke-width="1"/>
  <line x1="67" y1="153" x2="79" y2="153" stroke="#7F77DD" stroke-width="1"/>
  <line x1="67" y1="158" x2="75" y2="158" stroke="#7F77DD" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="600" font-size="13" fill="#C8C4F8" x="92" y="148">Chart.yaml</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="92" y="164">Metadata &amp; version</text>

  <!-- values.yaml -->
  <rect x="254" y="124" width="172" height="72" rx="12" fill="#13102A"/>
  <rect x="254" y="124" width="172" height="4" rx="2" fill="#534AB7"/>
  <rect x="272" y="138" width="22" height="28" rx="3" fill="none" stroke="#7F77DD" stroke-width="1.2"/>
  <line x1="277" y1="148" x2="289" y2="148" stroke="#7F77DD" stroke-width="1"/>
  <line x1="277" y1="153" x2="289" y2="153" stroke="#7F77DD" stroke-width="1"/>
  <line x1="277" y1="158" x2="285" y2="158" stroke="#7F77DD" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="600" font-size="13" fill="#C8C4F8" x="302" y="148">values.yaml</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="302" y="164">Config defaults</text>

  <!-- templates/ -->
  <rect x="464" y="124" width="172" height="72" rx="12" fill="#13102A"/>
  <rect x="464" y="124" width="172" height="4" rx="2" fill="#534AB7"/>
  <path d="M482 138 Q482 136 484 136 L492 136 L495 140 L506 140 Q508 140 508 142 L508 164 Q508 166 506 166 L484 166 Q482 166 482 164 Z" fill="none" stroke="#7F77DD" stroke-width="1.2"/>
  <text font-family="sans-serif" font-weight="600" font-size="13" fill="#C8C4F8" x="516" y="148">templates/</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="516" y="164">K8s manifests</text>

  <!-- converging lines -->
  <path d="M130 196 L130 220 L340 220" fill="none" stroke="#534AB7" stroke-width="1" stroke-opacity=".6" marker-end="url(#arr)"/>
  <line x1="340" y1="196" x2="340" y2="220" stroke="#534AB7" stroke-width="1" stroke-opacity=".6" marker-end="url(#arr)"/>
  <path d="M550 196 L550 220 L340 220" fill="none" stroke="#534AB7" stroke-width="1" stroke-opacity=".6" marker-end="url(#arr)"/>

  <!-- helm package -->
  <rect x="140" y="228" width="400" height="60" rx="30" fill="#1E1650"/>
  <rect x="140" y="228" width="400" height="60" rx="30" fill="none" stroke="#7F77DD" stroke-width="1.2"/>
  <rect x="170" y="244" width="24" height="24" rx="4" fill="none" stroke="#AFA9EC" stroke-width="1.2"/>
  <line x1="170" y1="252" x2="194" y2="252" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="182" y1="244" x2="182" y2="268" stroke="#AFA9EC" stroke-width="1"/>
  <text font-family="sans-serif" font-weight="700" font-size="14" fill="#C8C4F8" x="340" y="254" text-anchor="middle">helm package</text>
  <text font-family="sans-serif" font-size="11" fill="#888780" x="340" y="272" text-anchor="middle">Bundles chart into .tgz archive</text>

  <!-- animated dashed arrow -->
  <line x1="340" y1="288" x2="340" y2="318" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 4" class="d1" marker-end="url(#arr)"/>

  <!-- registry -->
  <rect x="140" y="322" width="400" height="60" rx="12" fill="#13102A"/>
  <rect x="140" y="322" width="4" height="60" rx="2" fill="#5DCAA5"/>
  <ellipse cx="178" cy="352" rx="16" ry="10" fill="none" stroke="#5DCAA5" stroke-width="1.2"/>
  <ellipse cx="188" cy="348" rx="10" ry="8" fill="none" stroke="#5DCAA5" stroke-width="1.2"/>
  <rect x="162" y="352" width="36" height="8" rx="0" fill="#13102A"/>
  <rect x="162" y="354" width="36" height="6" rx="3" fill="none" stroke="#5DCAA5" stroke-width="1.2"/>
  <text font-family="sans-serif" font-weight="700" font-size="14" fill="#9FE1CB" x="350" y="348" text-anchor="middle">Chart registry</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="350" y="366" text-anchor="middle">Artifact Hub · OCI · private repo</text>

  <!-- helm install transition -->
  <line x1="340" y1="382" x2="340" y2="412" stroke="#EF9F27" stroke-width="2" stroke-dasharray="6 4" class="d2" marker-end="url(#arr)"/>
  <rect x="216" y="394" width="248" height="24" rx="12" fill="#1A1200"/>
  <text font-family="sans-serif" font-size="12" font-weight="600" fill="#EF9F27" x="340" y="410" text-anchor="middle">helm install / upgrade</text>

  <!-- K8S zone label -->
  <rect x="44" y="422" width="108" height="20" rx="10" fill="#0A1E38"/>
  <text font-family="sans-serif" font-size="11" font-weight="600" fill="#85B7EB" x="98" y="436" text-anchor="middle">KUBERNETES</text>

  <!-- API Server -->
  <rect x="44" y="448" width="592" height="68" rx="12" fill="#091830"/>
  <rect x="44" y="448" width="4" height="68" rx="2" fill="#378ADD"/>
  <rect x="64" y="462" width="30" height="8" rx="3" fill="none" stroke="#378ADD" stroke-width="1.2"/>
  <rect x="64" y="474" width="30" height="8" rx="3" fill="none" stroke="#378ADD" stroke-width="1.2"/>
  <circle cx="90" cy="466" r="2" fill="#378ADD"/>
  <circle cx="90" cy="478" r="2" fill="#378ADD"/>
  <text font-family="sans-serif" font-weight="700" font-size="15" fill="#85B7EB" x="108" y="472">API server</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="108" y="492">Validates resources · persists state to etcd</text>

  <!-- fork arrows -->
  <path d="M220 516 L150 548" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-opacity=".7" marker-end="url(#arr)"/>
  <path d="M460 516 L530 548" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-opacity=".7" marker-end="url(#arr)"/>

  <!-- etcd -->
  <rect x="44" y="552" width="220" height="60" rx="12" fill="#091830"/>
  <rect x="44" y="552" width="4" height="60" rx="2" fill="#888780"/>
  <ellipse cx="76" cy="566" rx="14" ry="5" fill="none" stroke="#888780" stroke-width="1.2"/>
  <line x1="62" y1="566" x2="62" y2="600" stroke="#888780" stroke-width="1.2"/>
  <line x1="90" y1="566" x2="90" y2="600" stroke="#888780" stroke-width="1.2"/>
  <ellipse cx="76" cy="600" rx="14" ry="5" fill="none" stroke="#888780" stroke-width="1.2"/>
  <text font-family="sans-serif" font-weight="700" font-size="14" fill="#B4B2A9" x="108" y="576">etcd</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="108" y="594">Cluster state store</text>

  <!-- Scheduler -->
  <rect x="416" y="552" width="220" height="60" rx="12" fill="#091830"/>
  <rect x="416" y="552" width="4" height="60" rx="2" fill="#378ADD"/>
  <rect x="434" y="562" width="26" height="26" rx="4" fill="none" stroke="#378ADD" stroke-width="1.2"/>
  <line x1="434" y1="570" x2="460" y2="570" stroke="#378ADD" stroke-width="1"/>
  <line x1="440" y1="558" x2="440" y2="564" stroke="#378ADD" stroke-width="1.2"/>
  <line x1="452" y1="558" x2="452" y2="564" stroke="#378ADD" stroke-width="1.2"/>
  <text font-family="sans-serif" font-weight="700" font-size="14" fill="#85B7EB" x="472" y="576">Scheduler</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="472" y="594">Assigns pods to nodes</text>

  <!-- scheduler to node -->
  <path d="M526 612 L526 640 L340 640" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="5 4" class="d3" marker-end="url(#arr)"/>

  <!-- Worker Node -->
  <rect x="44" y="644" width="592" height="68" rx="12" fill="#091830"/>
  <rect x="44" y="644" width="4" height="68" rx="2" fill="#378ADD"/>
  <rect x="64" y="660" width="30" height="30" rx="4" fill="none" stroke="#378ADD" stroke-width="1.2"/>
  <rect x="70" y="666" width="18" height="18" rx="2" fill="none" stroke="#378ADD" stroke-width="1"/>
  <line x1="68" y1="658" x2="68" y2="656" stroke="#378ADD" stroke-width="1.2"/>
  <line x1="76" y1="658" x2="76" y2="656" stroke="#378ADD" stroke-width="1.2"/>
  <line x1="84" y1="658" x2="84" y2="656" stroke="#378ADD" stroke-width="1.2"/>
  <text font-family="sans-serif" font-weight="700" font-size="15" fill="#85B7EB" x="108" y="672">Worker node + Kubelet</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="108" y="692">Pulls container image · starts runtime</text>

  <!-- pod fan arrows -->
  <path d="M200 712 L160 742" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="340" y1="712" x2="340" y2="742" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M480 712 L520 742" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Pod A -->
  <rect x="44" y="746" width="182" height="68" rx="12" fill="#041A10"/>
  <rect x="44" y="746" width="4" height="68" rx="2" fill="#1D9E75"/>
  <circle class="pod" cx="76" cy="772" r="5" fill="#1D9E75"/>
  <text font-family="sans-serif" font-weight="700" font-size="13" fill="#9FE1CB" x="96" y="768">Pod A</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="96" y="784">Container running</text>
  <rect x="56" y="796" width="52" height="8" rx="4" fill="#0F6E56" opacity=".6"/>
  <text font-family="sans-serif" font-size="9" fill="#9FE1CB" x="82" y="803" text-anchor="middle">RUNNING</text>

  <!-- Pod B -->
  <rect x="249" y="746" width="182" height="68" rx="12" fill="#041A10"/>
  <rect x="249" y="746" width="4" height="68" rx="2" fill="#1D9E75"/>
  <circle class="pod" cx="281" cy="772" r="5" fill="#1D9E75"/>
  <text font-family="sans-serif" font-weight="700" font-size="13" fill="#9FE1CB" x="301" y="768">Pod B</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="301" y="784">Container running</text>
  <rect x="261" y="796" width="52" height="8" rx="4" fill="#0F6E56" opacity=".6"/>
  <text font-family="sans-serif" font-size="9" fill="#9FE1CB" x="287" y="803" text-anchor="middle">RUNNING</text>

  <!-- Pod C -->
  <rect x="454" y="746" width="182" height="68" rx="12" fill="#041A10"/>
  <rect x="454" y="746" width="4" height="68" rx="2" fill="#1D9E75"/>
  <circle class="pod" cx="486" cy="772" r="5" fill="#1D9E75"/>
  <text font-family="sans-serif" font-weight="700" font-size="13" fill="#9FE1CB" x="506" y="768">Pod C</text>
  <text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="506" y="784">Container running</text>
  <rect x="466" y="796" width="52" height="8" rx="4" fill="#0F6E56" opacity=".6"/>
  <text font-family="sans-serif" font-size="9" fill="#9FE1CB" x="492" y="803" text-anchor="middle">RUNNING</text>

  <!-- footer -->
  <line x1="60" y1="836" x2="620" y2="836" stroke="#161D30" stroke-width="1"/>
  <text font-family="sans-serif" font-size="11" fill="#3C3489" x="340" y="856" text-anchor="middle">#Kubernetes  #Helm  #DevOps  #CloudNative  #Containers</text>
</svg>
