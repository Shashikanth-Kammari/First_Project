apiVersion: rbac.authorization.k8s.io/v1
kind: Role 
metadata: 
  namespace: macys
  name: macys-pod-reader
rules:
- apiGrpups: [""]
  resources: ["pods"]
  verbs: ["get","watch","list"]
---

apiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "jane" to read pods in the "default" namespace.
# You need to already have a Role named "pod-reader" in that namespace.
kind: RoleBinding
metadata:
  name: macys-pod-reader
  namespace: macys
subjects:
# You can specify more than one "subject"
- kind: User
  name: shashi # "name" is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  # "roleRef" specifies the binding to a Role / ClusterRole
  kind: Role #this must be Role or ClusterRole
  name: macys-pod-reader # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: macys-cluster-reader
rules: 
- apiGroups: [""]
  resources: ["secrets","persistentvolumes","nodes"]
  verbs: ["get","watch","list"]

---
apiVersion: rbac.authorization.k8s.io/v1
# This cluster role binding allows anyone in the "manager" group to read secrets in any namespace.
kind: ClusterRoleBinding
metadata:
  name: macys-cluster-reader
subjects:
- kind: User
  name: shashi # Name is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: macys-cluster-reader
  apiGroup: rbac.authorization.k8s.io