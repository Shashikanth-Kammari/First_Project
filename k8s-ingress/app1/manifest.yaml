apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
  labels:
    app: app1
    purpose: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
      purpose: ingress
  template:
    metadata:
      labels:
        app: app1
        purpose: ingress
    spec:
      containers:
      - name: app1
        image: shashikanth/app1.0
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    app: app1
    purpose: ingress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80