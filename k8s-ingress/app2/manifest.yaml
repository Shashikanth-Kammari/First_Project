apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
  labels:
    app: app2
    purpose: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2
      purpose: ingress
  template:
    metadata:
      labels:
        app: app2
        purpose: ingress
    spec:
      containers:
      - name: app2
        image: shashikanth/app2.0
---
apiVersion: v1
kind: Service
metadata:
  name: app2
spec:
  selector:
    app: app2
    purpose: ingress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---


apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app2
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/tags: Environment=dev,Team=test
    alb.ingress.kubernetes.io/group.name: shashikanth 
spec:  
  ingressClassName: alb  
  rules:
    - host: macys.app2.com #ALB rule 
      http:
        paths:
          - path: /api
            backend:
              service:
                name: app2  # ALB target group
                port:
                  number: 80