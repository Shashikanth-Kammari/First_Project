apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: project
            operator: In
            values:
            - macys         
  containers:
  - name: node-affinity
    image: nginx
    imagePullPolicy: always
  tolerations:
  - key: "project"
    operator: "Equal"
    value: "macys"
    effect: "NoSchedule"