apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-dynamic
spec:
  accessModes:
    - ReadWriteMany # Allows multiple pods to connect simultaneously
  storageClassName: efs-dynamic
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: efs-dynamic
  labels:
    purpose: efs-dynamic
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: efs-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: efs-storage
      persistentVolumeClaim:
        claimName: efs-dynamic

---
apiVersion: v1
kind: Service
metadata:
  name: efs-dynamic
spec: 
  selector:
    purpose: efs-dynamic
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
