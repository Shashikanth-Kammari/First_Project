apiVersion: v1 
kind: PersistantVolume
metadata:
  name: macys-efs-statis
spec:
  capacity:
   storage: 5Gi
  volumeMode:  Filesystem
  accessModes:
  - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReClaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: "fs-e6346536xdc"
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-static-claim
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  VolumeName: efs-static
  resources:
    requests:
      storage: 
      
---
apiVersion: v1
kind: Pod
metadata:
  name: efs-app-pod
  labels:
    purpose: efs-static
spec:
  containers:
    - name: app
      image: nginx
      ports:
        - containerPort: 80
      volumeMounts:
        - name: efs-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: efs-storage
      persistentVolumeClaim:
        claimName: efs-static-claim
---
apiVersion: v1 
kind: Service
metadata:
  name:  efs-static
spec:
  type: LoadBalancer
  selector:
    purpose: efs-static
  ports:
  - protocol:  TCP   #service port
    port:  80 #traget port
    targetPort: 80